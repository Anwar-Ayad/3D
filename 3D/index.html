<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Model Viewer</title>

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(circle at center, #111, #000);
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
        background-color: transparent;
      }

      .hint {
        position: absolute;
        bottom: calc(20px + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        color: white;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 15px;
        border-radius: 20px;
        font-size: 14px;
        backdrop-filter: blur(10px);
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <model-viewer
      src="../Sculptures/lion-sitting-4.glb"
      ios-src="../Sculptures/lion-sitting-4.usdz"
      alt="3D model in AR"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      environment-image="neutral"
      touch-action="pan-x pan-y"
    >
      <!-- 🔥 MODIFICATION ICI : bouton déplacé en haut à droite -->
      <button
        slot="ar-button"
        style="
          position: absolute;
          top: calc(20px + env(safe-area-inset-top));
          right: 20px;
          padding: 12px 16px;
          border: none;
          border-radius: 999px;
          background: #ffffff;
          color: #111;
          font-weight: 600;
          cursor: pointer;
          z-index: 1000;
        "
      >
        View in AR
      </button>
    </model-viewer>

    <div class="hint">Tap the AR button to view it in your room</div>
  </body>
</html>
